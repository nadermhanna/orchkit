name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          # No registry-url: it makes setup-node plant a token-based .npmrc
          # (NODE_AUTH_TOKEN) that overrides OIDC and breaks trusted publishing.
      # OIDC trusted publishing needs npm >= 11.5.1; the bundled npm is older.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Auth via OIDC trusted publishing — configured on npmjs.com under
      # orchkit → Settings → Trusted Publisher. No stored token needed.
      - run: npm publish --provenance --access public
